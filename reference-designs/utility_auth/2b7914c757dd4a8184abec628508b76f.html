<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration - Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 md:px-20 lg:px-40 flex flex-1 justify-center py-10">
<div class="layout-content-container flex flex-col max-w-[640px] flex-1 bg-white dark:bg-slate-900 shadow-sm rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header Component -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-100 dark:border-slate-800 px-6 py-4">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary text-white">
<span class="material-symbols-outlined">app_registration</span>
</div>
<div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">Registration</h2>
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">Account Setup</p>
</div>
</div>
<button class="flex items-center justify-center rounded-full size-10 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Progress Indicator -->
<div class="flex flex-col gap-3 p-6 bg-slate-50/50 dark:bg-slate-800/30">
<div class="flex justify-between items-center">
<div class="flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold">Step 1 of 4</p>
<p class="text-primary text-xs font-bold uppercase tracking-wide">Basic Information</p>
</div>
<div class="flex items-center gap-2">
<span class="text-slate-900 dark:text-slate-100 text-sm font-bold">25%</span>
</div>
</div>
<div class="h-2.5 w-full rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden">
<div class="h-full rounded-full bg-primary transition-all duration-500" style="width: 25%;"></div>
</div>
<div class="flex justify-between mt-1">
<div class="flex flex-col items-center gap-1">
<div class="size-2 rounded-full bg-primary"></div>
</div>
<div class="flex flex-col items-center gap-1">
<div class="size-2 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
<div class="flex flex-col items-center gap-1">
<div class="size-2 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
<div class="flex flex-col items-center gap-1">
<div class="size-2 rounded-full bg-slate-300 dark:bg-slate-600"></div>
</div>
</div>
</div>
<!-- Welcome Text -->
<div class="px-6 pt-8 pb-4">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold tracking-tight">Let's get started</h1>
<p class="text-slate-500 dark:text-slate-400 text-base mt-2">Please provide your contact details to create your account.</p>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-6 px-6 py-4">
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-bold ml-1">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary">
<span class="material-symbols-outlined text-xl">person</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="e.g. Jonathan Doe" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-bold ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-bold ml-1">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary">
<span class="material-symbols-outlined text-xl">call</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Footer / Action Area -->
<div class="flex items-center justify-between mt-6 pt-6 border-t border-slate-100 dark:border-slate-800">
<button class="px-6 py-3 text-slate-500 dark:text-slate-400 font-bold text-sm hover:text-slate-900 dark:hover:text-slate-100 transition-colors" type="button">
                            Cancel
                        </button>
<button class="flex items-center gap-2 px-8 py-3.5 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold transition-all shadow-lg shadow-primary/20" type="submit">
                            Continue
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</form>
<div class="px-6 py-6 bg-slate-50 dark:bg-slate-800/50 flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400 text-sm">lock</span>
<p class="text-xs text-slate-500 dark:text-slate-400">Your data is protected with end-to-end encryption and will never be shared with third parties.</p>
</div>
</div>
</div>
</div>
</body></html>
